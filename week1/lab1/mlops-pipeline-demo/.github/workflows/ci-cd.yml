name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  GCP_REGION: us-central1
  REPOSITORY: mlops-demo-repo
  SERVICE_NAME: mlops-demo-api

jobs:
  # ---------------------------------------------------------------------
  # STAGE A: CI — runs on every push and PR. This is the part you'll see
  # working first, before you've touched GCP at all.
  # ---------------------------------------------------------------------
  test:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pytest
        run: pytest -v

  # ---------------------------------------------------------------------
  # STAGE B: CD — only runs after tests pass, and only on pushes to main
  # (not on PRs, so it never deploys from an unreviewed branch).
  # Requires GCP_PROJECT_ID and GCP_SA_KEY secrets — see README.
  # ---------------------------------------------------------------------
  build-and-deploy:
    name: Build, push, and deploy
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build image
        run: |
          docker build -t ${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.SERVICE_NAME }}:${{ github.sha }} .

      - name: Push image to Artifact Registry
        run: |
          docker push ${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.SERVICE_NAME }}:${{ github.sha }}

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image ${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.SERVICE_NAME }}:${{ github.sha }} \
            --project ${{ secrets.GCP_PROJECT_ID }} \
            --region ${{ env.GCP_REGION }} \
            --platform managed \
            --allow-unauthenticated
